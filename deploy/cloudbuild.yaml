# cloud-relay を非ルート Dockerfile（cmd/relay/Dockerfile）で
# ビルドし Artifact Registry へ push。コンテキスト=モジュールルート。
#   gcloud builds submit --config deploy/cloudbuild.yaml \
#     --substitutions=_IMAGE=<REGION>-docker.pkg.dev/<PID>/cm/cloud-relay
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - cmd/relay/Dockerfile
      - -t
      - ${_IMAGE}
      - .
images:
  - ${_IMAGE}
options:
  logging: CLOUD_LOGGING_ONLY
